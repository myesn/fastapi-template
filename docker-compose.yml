name: fastapi-template

services:
  app:
    image: fastapi-template
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: production
      APP_URL: http://192.168.101.4:8001
      POSTGRES_SERVER: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: example_db
    volumes:
      - app_static:/project/static
    depends_on:
      db:
        condition: service_healthy

  db:
    image: docker.1ms.run/postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: example_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docs/database/database-schema.sql:/docker-entrypoint-initdb.d/database-schema.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  app_static: